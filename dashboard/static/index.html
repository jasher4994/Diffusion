<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Diffusion RL Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
    body {
      padding-top: 1rem;
    }

    #runs-list .form-check {
      padding: .25rem .5rem;
      border-radius: 4px;
    }

    #runs-list .form-check:hover {
      background: #f4f4f4;
    }

    .chart-card {
      height: 260px;
    }

    .chart-card canvas {
      max-height: 220px;
    }

    .grid-img {
      max-width: 100%;
      image-rendering: pixelated;
      border: 1px solid #ddd;
    }

    .step-label {
      font-family: monospace;
      font-size: .9rem;
    }

    .run-color-swatch {
      display: inline-block;
      width: .9rem;
      height: .9rem;
      border-radius: 2px;
      margin-right: .4rem;
      vertical-align: middle;
    }

    pre.cfg {
      font-size: .75rem;
      max-height: 12rem;
      overflow: auto;
    }

    .formula-block {
      background: #f8f9fa;
      border: 1px solid #e3e3e3;
      border-radius: 4px;
      padding: .5rem .75rem;
      margin: .25rem 0 .5rem;
      overflow-x: auto;
    }

    .formula-label {
      font-size: .8rem;
      font-weight: 600;
      color: #555;
      margin-bottom: .15rem;
    }

    .run-objective + .run-objective {
      border-top: 1px solid #eee;
      margin-top: .75rem;
      padding-top: .5rem;
    }
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
</head>

<body>
  <div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3 class="m-0">Diffusion RL Dashboard</h3>
      <div class="d-flex gap-2">
        <a href="/static/model_comparison.html" target="_blank"
           class="btn btn-sm btn-outline-primary">DDPM vs GRPO ↗</a>
        <button id="refresh-btn" class="btn btn-sm btn-outline-secondary">↻ Refresh</button>
      </div>
    </div>

    <div class="row">
      <!-- Sidebar: run picker -->
      <div class="col-md-3">
        <div class="card">
          <div class="card-header">Runs</div>
          <div class="card-body p-2" id="runs-list">
            <em class="text-muted">Loading…</em>
          </div>
        </div>
      </div>

      <!-- Main: charts + samples -->
      <div class="col-md-9">
        <!-- Objective: reward + loss formulas for the selected run(s) -->
        <div class="card mb-3" id="objective-card">
          <div class="card-header">Objective &mdash; reward &amp; loss</div>
          <div class="card-body" id="objective-body">
            <em class="text-muted">Select a run to see its reward and loss function.</em>
          </div>
        </div>

        <!-- Charts -->
        <div class="row g-2 mb-3" id="charts-row">
          <div class="col-md-6">
            <div class="card chart-card p-2">
              <strong>Reward (mean)</strong><canvas id="chart-reward"></canvas>
            </div>
          </div>
          <div class="col-md-6">
            <div class="card chart-card p-2">
              <strong>KL to reference</strong><canvas id="chart-kl"></canvas>
            </div>
          </div>
          <div class="col-md-6">
            <div class="card chart-card p-2">
              <strong>Sample diversity</strong><canvas id="chart-diversity"></canvas>
            </div>
          </div>
          <div class="col-md-6">
            <div class="card chart-card p-2">
              <strong>Per-pixel std</strong><canvas id="chart-pps"></canvas>
            </div>
          </div>
        </div>

        <!-- Sample grids per selected run -->
        <div id="samples-section"></div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="/static/app.js"></script>
</body>

</html>
